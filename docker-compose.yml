services:
  redis:
    image: redis:7-alpine
    # AOF on, fsync every second — authoritative live state with ≤1s crash window (ADR-0001).
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      # Bound to IPv4 loopback so `localhost` resolves cleanly on macOS (the default
      # publish also binds [::], whose IPv6 loopback resets under Docker Desktop/OrbStack).
      # Loopback-only keeps the port off the LAN — correct for local-dev.
      - "127.0.0.1:6379:6379"
    volumes:
      # Bind mount: AOF + RDB live under ./data/redis in the project, not a named volume.
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rush
      POSTGRES_PASSWORD: rush
      POSTGRES_DB: rush_sale
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # Bind mount: the cluster data dir lives under ./data/postgres in the project.
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rush -d rush_sale"]
      interval: 2s
      timeout: 3s
      retries: 10

  # --- Application tier (profile "app") ----------------------------------------
  # Excluded from `docker compose up` (infra-only) unless the profile is active:
  #   docker compose --profile app up -d --build      (or: pnpm up)

  # One-shot: push the Drizzle schema, then exit. Uses the builder stage because
  # drizzle-kit is a dev dependency and is absent from the slim runtime image.
  migrate:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: pnpm --filter @rush-sale/api db:push
    environment:
      DATABASE_URL: postgres://rush:rush@postgres:5432/rush_sale
    depends_on:
      postgres:
        condition: service_healthy

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: rush-sale-api:local
    environment: &api-env
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://rush:rush@postgres:5432/rush_sale
      SEED_SALE_ID: launch-2026
      SEED_SALE_PRODUCT: Limited Sneaker Drop
      SEED_SALE_STOCK: "1000"
      SEED_SALE_STARTS_AT: 2026-06-13T00:00:00Z
      SEED_SALE_ENDS_AT: 2026-12-31T23:59:59Z
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Same image as the api, different entrypoint — drains the Stream into the Ledger.
  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: rush-sale-api:local
    command: node dist/worker.js
    environment: *api-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - api

  # --- Admin UIs (profile "tools") ---------------------------------------------
  # Inspect the live database + cache. Excluded from the default/app stacks:
  #   docker compose --profile tools up -d            (or: pnpm tools:up)
  # Both auto-connect, so there is no login/registration step.

  # Postgres web UI — http://localhost:8081
  pgweb:
    profiles: ["tools"]
    image: sosedoff/pgweb:0.16.2
    environment:
      PGWEB_DATABASE_URL: postgres://rush:rush@postgres:5432/rush_sale?sslmode=disable
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  # Redis web UI — http://localhost:8082
  redis-commander:
    profiles: ["tools"]
    # Pinned by digest — upstream is infrequently updated and only tags `:latest`.
    image: rediscommander/redis-commander@sha256:19cd0c49f418779fa2822a0496c5e6516d0c792effc39ed20089e6268477e40a
    # Image is amd64-only; declare it so Docker emulates quietly on arm64 (Apple
    # Silicon) instead of warning. Dev-only admin UI — emulation is fine.
    platform: linux/amd64
    environment:
      REDIS_HOSTS: local:redis:6379
    # The image always serves on 8081 internally; publish it on host 8082.
    ports:
      - "127.0.0.1:8082:8081"
    depends_on:
      redis:
        condition: service_healthy

  # --- Load testing (profile "load") -------------------------------------------
  # Run k6 in a container — no global k6 install needed. The app stack must already
  # be running and seeded (`pnpm up`); k6 joins the same network and hits the api
  # service directly at http://api:3000.
  #   pnpm load:herd
  #   docker compose --profile load run --rm k6 run scenarios/thundering-herd.js
  k6:
    profiles: ["load"]
    image: grafana/k6:0.50.0
    environment:
      BASE_URL: http://api:3000
      SALE_ID: launch-2026
    volumes:
      # Scenarios are read-only inputs; k6 never writes into the mount.
      - ./apps/load:/load:ro
    working_dir: /load
