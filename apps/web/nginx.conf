server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Same-origin API: proxy /api/* to the API service so the browser never makes a
    # cross-origin call. This avoids CORS and host-specific URLs, so the storefront
    # works on any OS regardless of how the host port is reached (localhost or 127.0.0.1).
    #
    # Docker's embedded DNS (127.0.0.11) plus a variable upstream defers name resolution
    # to request time: nginx starts even before the API is up and transparently picks up
    # the API container across restarts.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $api_upstream http://api:3000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: unknown paths fall back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
